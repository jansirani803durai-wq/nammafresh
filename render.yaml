services:
  - type: web
    name: nammafresh-backend
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn nammafresh.wsgi:application
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: nammafresh-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://nammafresh-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://nammafresh-frontend.onrender.com
      - key: USE_SQLITE
        value: true

  - type: web
    name: nammafresh-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://nammafresh-backend.onrender.com/api
